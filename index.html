<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>EmpowerHer</title>
    <style>
      /* Completely hide Google Translate widget and all its popups */
      #google_translate_element { display: none !important; }
      .skiptranslate { display: none !important; }
      .goog-te-banner-frame.skiptranslate { display: none !important; }
      .goog-te-balloon-frame { display: none !important; }
      
      /* Disable hover tooltip */
      #goog-gt-tt { display: none !important; }
      .goog-text-highlight { background: none !important; box-shadow: none !important; }
      
      /* Fix body shifting from the missing banner */
      body { top: 0 !important; position: static !important; }
      
      /* The script injects classes on HTML sometimes */
      html { height: 100% !important; overflow-y: auto !important; }
    </style>
    <meta name="description" content="Lovable Generated Project" />
    <meta name="author" content="Lovable" />

    <!-- TODO: Update og:title to match your application name -->
    <meta property="og:title" content="Lovable App" />
    <meta property="og:description" content="Lovable Generated Project" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <div id="root"></div>
    <div id="google_translate_element" style="display:none;"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,hi,bn,te,mr,ta,ur,gu,kn,or,ml,pa,as,mai,sat,ks,ne,kok,sd,doi,mni,brx,sa',
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
